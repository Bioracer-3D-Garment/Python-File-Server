services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.cpu
    command: celery -A pipeline.worker worker --loglevel=info --concurrency=4
    env_file: .env
    depends_on:
      - redis
    environment:
      - PIPELINE__CELERY__BROKER_URL=redis://redis:6379/0
      - PIPELINE__CELERY__RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./inputs:/app/inputs
      - ./poses:/app/poses
      - ./outputs:/app/outputs
      - ./config:/app/config

  pipeline-gpu:
    build:
      context: .
      dockerfile: docker/Dockerfile.gpu
    env_file: .env
    volumes:
      - ./inputs:/app/inputs
      - ./poses:/app/poses
      - ./outputs:/app/outputs
      - ./config:/app/config
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  pipeline-cpu:
    build:
      context: .
      dockerfile: docker/Dockerfile.cpu
    env_file: .env
    volumes:
      - ./inputs:/app/inputs
      - ./poses:/app/poses
      - ./outputs:/app/outputs
      - ./config:/app/config
    profiles:
      - cpu
